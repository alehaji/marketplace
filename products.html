<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f2;
      --surface: #ffffff;
      --text: #1a1a1a;
      --muted: #9a9490;
      --border: #e8e4df;
      --tag-bg: #f0ece7;
    }

    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      padding: 2rem 4rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky; top: 0; z-index: 10;
    }
    .logo { font-family: 'DM Serif Display', serif; font-size: 1.5rem; letter-spacing: -0.02em; }
    .logo em { font-style: italic; color: var(--muted); }
    nav { display: flex; gap: 2.5rem; font-size: 0.85rem; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
    nav span { cursor: pointer; transition: color 0.2s; }
    nav span:hover { color: var(--text); }
    .cart { font-size: 0.85rem; font-weight: 500; cursor: pointer; border: 1px solid var(--border); padding: 0.5rem 1.2rem; border-radius: 2rem; transition: background 0.2s, color 0.2s; }
    .cart:hover { background: var(--text); color: #fff; border-color: var(--text); }

    .hero { padding: 5rem 4rem 3rem; max-width: 1400px; margin: 0 auto; }
    .hero-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 1rem; }
    .hero h1 { font-family: 'DM Serif Display', serif; font-size: clamp(2.5rem, 5vw, 4.5rem); line-height: 1.05; letter-spacing: -0.02em; max-width: 600px; }
    .hero h1 em { font-style: italic; color: var(--muted); }

    .filter-bar { max-width: 1400px; margin: 0 auto; padding: 0 4rem 2.5rem; display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
    .filter-btn { font-family: 'DM Sans', sans-serif; font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.45rem 1.1rem; border-radius: 2rem; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.2s; }
    .filter-btn:hover, .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

    .grid { max-width: 1400px; margin: 0 auto; padding: 0 4rem 6rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: transform 0.3s cubic-bezier(.22,.68,0,1.2), box-shadow 0.3s; animation: fadeUp 0.5s ease both; }
    .card:hover { transform: translateY(-5px); box-shadow: 0 20px 50px rgba(0,0,0,0.07); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .card:nth-child(1){animation-delay:.05s} .card:nth-child(2){animation-delay:.10s} .card:nth-child(3){animation-delay:.15s} .card:nth-child(4){animation-delay:.20s}
    .card:nth-child(5){animation-delay:.25s} .card:nth-child(6){animation-delay:.30s} .card:nth-child(7){animation-delay:.35s} .card:nth-child(8){animation-delay:.40s}

    .card-img-wrap { overflow: hidden; position: relative; }
    .card-image { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; background: var(--tag-bg); transition: transform 0.5s cubic-bezier(.22,.68,0,1.2); }
    .card:hover .card-image { transform: scale(1.04); }

    .card-badge { position: absolute; top: 1rem; left: 1rem; font-size: 0.68rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; background: var(--text); color: #fff; padding: 0.25rem 0.7rem; border-radius: 2rem; }

    .card-body { padding: 1.25rem 1.4rem 1.4rem; }
    .card-category { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.4rem; }
    .card-name { font-family: 'DM Serif Display', serif; font-size: 1.15rem; line-height: 1.3; margin-bottom: 0.5rem; letter-spacing: -0.01em; }
    .card-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.55; margin-bottom: 1.2rem; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .card-price { font-size: 1.05rem; font-weight: 500; letter-spacing: -0.01em; }
    .add-btn { font-family: 'DM Sans', sans-serif; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; background: var(--text); color: #fff; border: none; border-radius: 2rem; padding: 0.5rem 1.1rem; cursor: pointer; transition: opacity 0.2s, transform 0.15s; }
    .add-btn:hover { opacity: 0.75; transform: scale(0.97); }
    .add-btn:active { transform: scale(0.93); }

    /* Loading & error states */
    .state-msg { max-width: 1400px; margin: 0 auto; padding: 2rem 4rem; color: var(--muted); font-size: 0.9rem; }
    .state-msg.error { color: #c0392b; }

    footer { text-align: center; padding: 2rem; border-top: 1px solid var(--border); font-size: 0.78rem; color: var(--muted); letter-spacing: 0.04em; }

    @media (max-width: 768px) {
      header { padding: 1.5rem; } nav { display: none; }
      .hero, .filter-bar, .grid, .state-msg { padding-left: 1.5rem; padding-right: 1.5rem; }
      .hero { padding-top: 3rem; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.2rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Studio<em>goods</em></div>
  <nav><span>Shop</span><span>About</span><span>Journal</span></nav>
  <div class="cart">Bag (0)</div>
</header>

<section class="hero">
  <p class="hero-label">New Collection — 2026</p>
  <h1>Curated things, <em>made to last.</em></h1>
</section>

<div class="filter-bar" id="filter-bar">
  <button class="filter-btn active" onclick="filterProducts(this,'all')">All</button>
</div>

<div id="status" class="state-msg">Loading products…</div>
<div class="grid" id="grid"></div>

<footer>© 2026 Studiogoods · All rights reserved</footer>

<script>
  const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRzw5rEP3HrALT1Nv9cEczz9nihGB83bCTXD4CDhRxlDYtPNyFSM0rMQhYZfHvvGwxZ__YFi--lF3tL/pub?output=csv';

  let allProducts = [];
  let activeCategory = 'all';

  // ── CSV parser (handles quoted fields with commas inside) ──────────────────
  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = splitCSVRow(lines[0]).map(h => h.trim().toLowerCase());
    return lines.slice(1).map(line => {
      const vals = splitCSVRow(line);
      const obj = {};
      headers.forEach((h, i) => obj[h] = (vals[i] || '').trim());
      return obj;
    }).filter(row => row.name); // skip blank rows
  }

  function splitCSVRow(row) {
    const result = [];
    let cur = '', inQuote = false;
    for (let i = 0; i < row.length; i++) {
      const ch = row[i];
      if (ch === '"') { inQuote = !inQuote; continue; }
      if (ch === ',' && !inQuote) { result.push(cur); cur = ''; continue; }
      cur += ch;
    }
    result.push(cur);
    return result;
  }

  // ── Build category filter buttons dynamically ─────────────────────────────
  function buildFilters(products) {
    const categories = ['all', ...new Set(products.map(p => p.category).filter(Boolean))];
    const bar = document.getElementById('filter-bar');
    bar.innerHTML = categories.map((cat, i) =>
      `<button class="filter-btn${i === 0 ? ' active' : ''}" onclick="filterProducts(this,'${cat}')">${cat}</button>`
    ).join('');
  }

  // ── Render grid ───────────────────────────────────────────────────────────
  function render(list) {
    const grid = document.getElementById('grid');
    grid.innerHTML = list.map(p => `
      <div class="card" data-cat="${p.category}">
        <div class="card-img-wrap">
          <img class="card-image" src="${p.image}" alt="${p.name}" loading="lazy"/>
          ${p.badge ? `<span class="card-badge">${p.badge}</span>` : ''}
        </div>
        <div class="card-body">
          <div class="card-category">${p.category}</div>
          <div class="card-name">${p.name}</div>
          <div class="card-desc">${p.desc}</div>
          <div class="card-footer">
            <span class="card-price">${p.price}</span>
            <button class="add-btn" onclick="addToCart(this)">Add</button>
          </div>
        </div>
      </div>`).join('');
  }

  function filterProducts(btn, cat) {
    activeCategory = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(cat === 'all' ? allProducts : allProducts.filter(p => p.category === cat));
  }

  function addToCart(btn) {
    btn.textContent = '✓ Added';
    btn.style.background = '#4caf50';
    setTimeout(() => { btn.textContent = 'Add'; btn.style.background = ''; }, 1400);
  }

  // ── Fetch & init ──────────────────────────────────────────────────────────
  async function loadProducts() {
    const status = document.getElementById('status');
    try {
      const res = await fetch(CSV_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      allProducts = parseCSV(text);

      if (!allProducts.length) throw new Error('No products found in sheet.');

      buildFilters(allProducts);
      render(allProducts);
      status.style.display = 'none';
    } catch (err) {
      status.textContent = `Could not load products: ${err.message}`;
      status.classList.add('error');
    }
  }

  loadProducts();
</script>
</body>
</html>
